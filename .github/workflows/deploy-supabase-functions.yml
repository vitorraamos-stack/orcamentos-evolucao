name: Deploy Supabase Edge Functions

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify:prod
      - run: npm run verify:predeploy:edge
      - uses: supabase/setup-cli@v1
        with:
          version: 2.52.3
      # Deploy explícito por allowlist para evitar publicação acidental de funções legadas.
      # Política: funções só entram em produção quando adicionadas conscientemente nesta lista.
      # Rotas de otimização são canônicas na Vercel (/api/hub-os/optimize-installations), não em Edge Functions.
      - run: |
          functions=(
            r2-presign-upload
            r2-presign-download
            r2-delete-objects
            r2-health
          )

          for fn in "${functions[@]}"; do
            supabase functions deploy "$fn" --project-ref "$PROJECT_ID"
          done
